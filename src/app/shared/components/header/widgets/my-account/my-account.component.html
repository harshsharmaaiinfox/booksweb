<!-- Not Logged In: Direct link to login -->
<a [routerLink]="['/auth/login']" class="kf-account-btn" *ngIf="!(isAuthenticated$ | async)">
    <i class="ri-user-3-line"></i>
</a>

<!-- Logged In: Direct link to dashboard -->
<a [routerLink]="['/account/dashboard']" class="kf-account-btn logged-in" *ngIf="(isAuthenticated$ | async)">
    <div class="user-avatar" *ngIf="(user$ | async)?.profile_image?.original_url else initial">
        <img [src]="(user$ | async)?.profile_image?.original_url" alt="profile">
    </div>
    <ng-template #initial>
        <span class="avatar-initial">{{ (user$ | async)?.name?.charAt(0)?.toString()?.toUpperCase() }}</span>
    </ng-template>
</a>

<app-confirmation-modal
    #confirmationModal
    (confirmed)="logout()">
</app-confirmation-modal>
