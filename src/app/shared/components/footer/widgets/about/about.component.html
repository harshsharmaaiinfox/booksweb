<div class="footer-logo-contain">
    <p *ngIf="data?.footer?.footer_about">{{ data?.footer?.footer_about }}</p>
    <ul class="address">
        <h2>Register Address</h2>
        <li>
            <i class="ri-home-line"></i>
           
            <a href="https://www.google.com/maps" target="_blank" title="View on Google Maps" *ngIf="data?.footer?.about_address">{{ data?.footer?.about_address }}</a>
        </li>
        <li>
            <i class="ri-mail-line"></i>
            <a href="mailto:{{ data?.footer?.about_email || 'info@mangalstore.in' }}" title="Send us an email">{{ data?.footer?.about_email || 'info&#64;mangalstore.in' }}</a>
        </li>
    </ul>
