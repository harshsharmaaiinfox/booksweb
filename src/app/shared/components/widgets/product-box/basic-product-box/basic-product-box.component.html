<div class="ind-card" [class]="class">

    <!-- ── IMAGE ── -->
    <div class="ind-card__image">
        <a [routerLink]="['/product/', product.slug]" class="ind-card__img-link">
            <img appLazyLoad
                [src]="product.product_thumbnail?.original_url || 'assets/images/product.png'"
                class="ind-card__img lazy-loading"
                [alt]="product.name"
                placeholder="assets/images/placeholder.png">
        </a>

        <!-- Sale % badge (top-left) -->
        <span class="ind-card__sale-badge"
            *ngIf="product.is_sale_enable && product.discount">
            {{ product.discount }}% off
        </span>

        <!-- Hover action icons (bottom of image) -->
        <div class="ind-card__actions">
            <!-- Wishlist -->
            <button class="ind-card__action-btn"
                (click)="addToWishlist(product)"
                [class.active]="product.is_wishlist"
                title="Wishlist">
                <i class="ri-heart-line" *ngIf="!product.is_wishlist"></i>
                <i class="ri-heart-fill" *ngIf="product.is_wishlist"></i>
            </button>

            <!-- Quick View -->
            <button class="ind-card__action-btn"
                (click)="cartPopupModal.openModal(product)"
                title="Quick View">
                <i class="ri-eye-line"></i>
            </button>

            <!-- Add to Cart -->
            <button class="ind-card__action-btn ind-card__action-btn--cart"
                (click)="addToCart(product, 1)"
                title="Add to Cart">
                <i class="ri-shopping-cart-line"></i>
            </button>

        </div>

        <!-- Close btn (wishlist page) -->
        <div class="ind-card__close" *ngIf="close">
            <app-button [class]="'btn close-button'" [spinner]="false" [id]="'close_btn'"
                (click)="removeWishlist(product.id)">
                <i class="ri-close-line"></i>
            </app-button>
        </div>
    </div>

    <!-- ── BODY ── -->
    <div class="ind-card__body">

        <!-- Category (plain text, above name) -->
        <span class="ind-card__category" *ngIf="product?.category?.name">
            {{ product.category.name }}
        </span>

        <!-- Product Name -->
        <a [routerLink]="['/product/', product.slug]" class="ind-card__name-link">
            <h3 class="ind-card__name">{{ product.name }}</h3>
        </a>

        <!-- Star Rating -->
        <div class="ind-card__rating">
            <span class="ind-card__stars">
                <i *ngFor="let s of [1,2,3,4,5]"
                    [class]="s <= (product.rating_count || 0) ? 'ri-star-fill' : 'ri-star-line'">
                </i>
            </span>
            <span class="ind-card__review-count">({{ product.reviews_count || 0 }})</span>
        </div>

        <!-- Price Row -->
        <div class="ind-card__price-row">
            <ng-container *ngIf="product.is_sale_enable && product.sale_price; else noSale">
                <span class="ind-card__price-orig">{{ product.price | currencySymbol }}</span>
                <span class="ind-card__price-sale">{{ product.sale_price | currencySymbol }}</span>
            </ng-container>
            <ng-template #noSale>
                <span class="ind-card__price-sale">{{ product.price | currencySymbol }}</span>
            </ng-template>
        </div>

    </div>

</div>
<app-product-detail-modal #productDetailModal [product]="product"></app-product-detail-modal>
<app-variation-modal #variationModal></app-variation-modal>
<app-cart-popup-modal #cartPopupModal></app-cart-popup-modal>
