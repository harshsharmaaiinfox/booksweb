<div class="fp-page">

  <!-- Breadcrumb -->
  <div class="fp-breadcrumb">
    <a routerLink="/">Home</a>
    <i class="ri-arrow-right-s-line"></i>
    <a routerLink="/auth/login">My Account</a>
  </div>

  <!-- Centered Content -->
  <div class="fp-center">

    <app-alert></app-alert>

    <!-- Description -->
    <p class="fp-description">
      Lost your password? Please enter your username or email address.
      You will receive a link to create a new password via email.
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="fp-form">

      <!-- Email / Username -->
      <div class="fp-field">
        <label for="fp-email">
          Username or email <span class="fp-req">*</span>
        </label>
        <input type="email" id="fp-email" formControlName="email"
          (input)="filterEmailCharacters($event)"
          pattern="[a-zA-Z0-9._\-+@]+"
          [class.fp-input-err]="form.controls['email'].touched && form.controls['email'].invalid">
        <span class="fp-error" *ngIf="form.controls['email'].touched && form.controls['email'].errors?.['required']">
          Email is required.
        </span>
        <span class="fp-error" *ngIf="form.controls['email'].touched && form.controls['email'].errors?.['email']">
          Invalid email address.
        </span>
      </div>

      <!-- ReCaptcha -->
      <div class="fp-field" *ngIf="reCaptcha">
        <re-captcha formControlName="recaptcha"></re-captcha>
        <span class="fp-error" *ngIf="form.controls['recaptcha']?.touched && form.controls['recaptcha']?.errors?.['required']">
          ReCaptcha is required.
        </span>
      </div>

      <!-- Submit -->
      <app-button [id]="'forgot_btn'" [class]="'fp-btn'">
        RESET PASSWORD
      </app-button>

    </form>

  </div>

</div>
