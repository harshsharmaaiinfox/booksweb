<div class="ma-page">

  <!-- Breadcrumb -->
  <div class="ma-breadcrumb">
    <a routerLink="/">Home</a>
    <i class="ri-arrow-right-s-line"></i>
    <span>My Account</span>
  </div>

  <div class="ma-wrapper ma-wrapper--single">

    <div class="ma-col">
      <h2 class="ma-heading">Login</h2>

      <app-alert></app-alert>

      <form [formGroup]="form" (ngSubmit)="submit()" class="ma-form">

        <!-- Email / Username -->
        <div class="ma-field">
          <label for="email">Username or email address <span class="ma-req">*</span></label>
          <input type="email" id="email" formControlName="email"
            (input)="filterEmailCharacters($event)"
            pattern="[a-zA-Z0-9._\-+@]+"
            [class.ma-input-err]="form.controls['email'].touched && form.controls['email'].invalid">
          <span class="ma-error" *ngIf="form.controls['email'].touched && form.controls['email'].errors?.['required']">Email is required.</span>
          <span class="ma-error" *ngIf="form.controls['email'].touched && form.controls['email'].errors?.['email']">Invalid email address.</span>
        </div>

        <!-- Password -->
        <div class="ma-field">
          <label for="password">Password <span class="ma-req">*</span></label>
          <div class="ma-pass-wrap">
            <input [type]="showPass ? 'text' : 'password'" id="password" formControlName="password"
              [class.ma-input-err]="form.controls['password'].touched && form.controls['password'].invalid">
            <button type="button" class="ma-eye-btn" (click)="showPass = !showPass" tabindex="-1">
              <i [class]="showPass ? 'ri-eye-off-line' : 'ri-eye-line'"></i>
            </button>
          </div>
          <span class="ma-error" *ngIf="form.controls['password'].touched && form.controls['password'].errors?.['required']">Password is required.</span>
        </div>

        <!-- ReCaptcha -->
        <div class="ma-field" *ngIf="reCaptcha">
          <re-captcha formControlName="recaptcha"></re-captcha>
          <span class="ma-error" *ngIf="form.controls['recaptcha']?.touched && form.controls['recaptcha']?.errors?.['required']">ReCaptcha is required.</span>
        </div>

        <!-- Remember Me + Lost Password -->
        <div class="ma-options">
          <label class="ma-check-label">
            <input type="checkbox" id="rememberme">
            <span class="ma-checkbox"></span>
            <span>Remember Me</span>
          </label>
          <a [routerLink]="['/auth/forgot-password']" class="ma-lost-pass">Lost your password?</a>
        </div>

        <!-- LOG IN button -->
        <app-button [id]="'login_btn'" [class]="'ma-btn'">LOG IN</app-button>

      </form>

      <p class="ma-switch-note">
        Don't have an account? <a [routerLink]="['/auth/register']" class="ma-privacy-link">Register here</a>
      </p>
    </div>

  </div>
</div>
