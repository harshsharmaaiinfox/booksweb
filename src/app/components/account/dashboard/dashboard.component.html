<div class="kf-dash-page">

    <!-- Profile Info -->
    <div class="kf-section">
        <div class="kf-section-head">
            <h3>Profile Information</h3>
            <a href="javascript:void(0)" (click)="PasswordModal.openModal()" class="kf-edit-link">
                <i class="ri-lock-line"></i> Change Password
            </a>
        </div>

        <div class="kf-info-grid">
            <div class="kf-info-item">
                <span class="kf-info-label">Name</span>
                <span class="kf-info-value">{{ (user$ | async)?.name | titleCase }}</span>
            </div>
            <div class="kf-info-item">
                <span class="kf-info-label">Email</span>
                <span class="kf-info-value">{{ (user$ | async)?.email }}</span>
            </div>
            <div class="kf-info-item">
                <span class="kf-info-label">Phone</span>
                <span class="kf-info-value">{{ (user$ | async)?.country_code }} {{ (user$ | async)?.phone }}</span>
            </div>
            <div class="kf-info-item" *ngIf="address">
                <span class="kf-info-label">Address</span>
                <span class="kf-info-value">{{ address.street }}, {{ address.city }}, {{ address.area }} {{ address.pincode }}</span>
            </div>
        </div>
    </div>


</div>
<app-edit-profile-modal #profileModal></app-edit-profile-modal>
<app-change-password-modal #passwordModal></app-change-password-modal>
