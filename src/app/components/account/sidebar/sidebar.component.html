<div class="kf-sidebar-card">
    <!-- User Info -->
    <div class="kf-user-block">
        <div class="kf-avatar">
            <img [src]="(user$ | async)?.profile_image?.original_url" alt="profile"
                *ngIf="(user$ | async)?.profile_image?.original_url else initials">
            <ng-template #initials>
                <span>{{ (user$ | async)?.name?.charAt(0)?.toString()?.toUpperCase() }}</span>
            </ng-template>
        </div>
        <div class="kf-user-info">
            <h4>{{ (user$ | async)?.name | titleCase }}</h4>
            <p>{{ (user$ | async)?.email }}</p>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="kf-nav">
        <a [routerLink]="['/account/dashboard']" [routerLinkActive]="['active']" (click)="openMenu(false)">
            <i class="ri-dashboard-line"></i> Dashboard
        </a>
        <a [routerLink]="['/account/order']" [routerLinkActive]="['active']" (click)="openMenu(false)">
            <i class="ri-file-list-3-line"></i> My Orders
        </a>
        <a [routerLink]="['/account/addresses']" [routerLinkActive]="['active']" (click)="openMenu(false)">
            <i class="ri-map-pin-line"></i> Addresses
        </a>
        <a [routerLink]="['/account/bank-details']" [routerLinkActive]="['active']" (click)="openMenu(false)">
            <i class="ri-bank-line"></i> Bank Details
        </a>

        <div class="kf-nav-divider"></div>

        <a href="javascript:void(0)" class="kf-logout" (click)="confirmationModal.openModal()">
            <i class="ri-logout-box-r-line"></i> Logout
        </a>
    </nav>
</div>
<app-confirmation-modal #confirmationModal (confirmed)="logout()"></app-confirmation-modal>
